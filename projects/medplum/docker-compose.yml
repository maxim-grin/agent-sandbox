# Medplum stack: Node/TypeScript worker + PostgreSQL + Redis.
#
# All Docker resources (network, workspace volume, results volume) are created
# by run_agent.sh before this compose file is invoked, so they are declared
# external here. run_agent.sh passes RUN_ID, SANDBOX_NETWORK,
# WORKSPACE_VOLUME, RESULTS_VOLUME, GROQ_KEY_FILE, and LLM_BASE_URL.

services:
  worker:
    image: "${WORKER_IMAGE}"
    container_name: "${RUN_ID}-medplum-worker-1"
    networks:
      - sandbox
    volumes:
      - workspace:/workspace
      - results:/sandbox/results
    working_dir: /workspace
    environment:
      CI: "true"
      NODE_ENV: "test"
      MEDPLUM_DATABASE_HOST: postgres
      MEDPLUM_DATABASE_PORT: "5432"
      MEDPLUM_DATABASE_DBNAME: medplum
      MEDPLUM_DATABASE_USERNAME: medplum
      MEDPLUM_DATABASE_PASSWORD: medplum
      DATABASE_URL: "postgresql://medplum:medplum@postgres:5432/medplum"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      MEDPLUM_REDIS_HOST: redis
      MEDPLUM_REDIS_PORT: "6379"
      REDIS_URL: "redis://redis:6379"
      NPM_CONFIG_UPDATE_NOTIFIER: "false"
      TURBO_TELEMETRY_DISABLED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 8g
    cpus: 2.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: sandboxuser
    command: ["sleep", "infinity"]
    healthcheck:
      test: ["CMD", "node", "--version"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: "${RUN_ID}-medplum-postgres"
    networks:
      - sandbox
    environment:
      POSTGRES_DB: medplum
      POSTGRES_USER: medplum
      POSTGRES_PASSWORD: medplum
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - max_connections=50
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=8MB
    volumes:
      - pgdata:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - NET_RAW
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_MODULE
      - SYS_PTRACE
    mem_limit: 1g
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medplum -d medplum"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: "${RUN_ID}-medplum-redis"
    networks:
      - sandbox
    user: redis
    command:
      - redis-server
      - "--save"
      - ""
      - "--appendonly"
      - "no"
      - "--maxmemory"
      - "128mb"
      - "--maxmemory-policy"
      - "noeviction"
      - "--bind"
      - "0.0.0.0"
      - "--protected-mode"
      - "no"
      - "--loglevel"
      - "warning"
    mem_limit: 192m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # NOTE: openhands is the legacy agent architecture; this stack is pending
  # migration to opencode (nerv pattern). When migrated, openhands is removed
  # and the worker gains an opencode entrypoint that reads from /run/secrets/groq_key.
  # LLM_API_KEY intentionally absent — secret delivered via GROQ_KEY_FILE mount.
  # Until migrated, this service is non-functional without a wrapper entrypoint.
  openhands:
    image: ghcr.io/all-hands-ai/openhands:latest
    container_name: "${RUN_ID}-medplum-openhands"
    environment:
      - LLM_MODEL=${LLM_MODEL}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_USE_JSON_MODE=true
      - OPENHANDS_ALWAYS_APPROVE=true
      - TASK=${TASK}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379
    volumes:
      - workspace:/workspace
      - results:/sandbox/results
    networks:
      - sandbox
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true
    command: >-
      openhands --headless --json --always-approve
      -t "${TASK}" --workspace /workspace

networks:
  sandbox:
    external: true
    name: "${SANDBOX_NETWORK}"

volumes:
  workspace:
    external: true
    name: "${WORKSPACE_VOLUME}"
  results:
    external: true
    name: "${RESULTS_VOLUME}"
  pgdata:
    # Not external — lifecycle-managed by this compose project.
    # Destroyed automatically by `docker compose down -v`, guaranteeing
    # no PostgreSQL state leaks between runs.
