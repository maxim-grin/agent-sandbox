# eShopOnWeb stack: .NET/C# worker only — no SQL Server.
#
# SQL Server has no ARM64 image and cannot run on Apple Silicon. eShopOnWeb
# supports an in-memory database mode (UseOnlyInMemoryDatabase=true) which is
# sufficient for build validation, test execution, and health-check probing.
#
# All Docker resources (network, workspace volume, results volume) are created
# by run_agent.sh before this compose file is invoked, so they are declared
# external here. run_agent.sh passes RUN_ID, SANDBOX_NETWORK,
# WORKSPACE_VOLUME, RESULTS_VOLUME, GROQ_KEY_FILE, and LLM_BASE_URL.

services:
  worker:
    image: "${WORKER_IMAGE}"
    container_name: "${RUN_ID}-eshoponweb-worker-1"
    networks:
      - sandbox
    volumes:
      - workspace:/workspace
      - results:/sandbox/results
    working_dir: /workspace
    environment:
      CI: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      UseOnlyInMemoryDatabase: "true"
      ASPNETCORE_URLS: "http://0.0.0.0:5000"
      ASPNETCORE_ENVIRONMENT: "Development"
      baseUrls__apiBase: "http://localhost:5099/api/"
    mem_limit: 2g
    cpus: 2.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: sandboxuser
    command: ["sleep", "infinity"]
    healthcheck:
      test: ["CMD", "dotnet", "--version"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s

  # NOTE: openhands is the legacy agent architecture; this stack is pending
  # migration to opencode (nerv pattern). When migrated, openhands is removed
  # and the worker gains an opencode entrypoint that reads from /run/secrets/groq_key.
  # LLM_API_KEY intentionally absent — secret delivered via GROQ_KEY_FILE mount.
  # Until migrated, this service is non-functional without a wrapper entrypoint.
  openhands:
    image: ghcr.io/all-hands-ai/openhands:latest
    container_name: "${RUN_ID}-eshoponweb-openhands"
    environment:
      - LLM_MODEL=${LLM_MODEL}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_USE_JSON_MODE=true
      - OPENHANDS_ALWAYS_APPROVE=true
      - TASK=${TASK}
      - UseOnlyInMemoryDatabase=true
      - ASPNETCORE_URLS=http://0.0.0.0:5000
    volumes:
      - workspace:/workspace
      - results:/sandbox/results
    networks:
      - sandbox
    stdin_open: true
    tty: true
    command: >-
      openhands --headless --json --always-approve
      -t "${TASK}" --workspace /workspace

networks:
  sandbox:
    external: true
    name: "${SANDBOX_NETWORK}"

volumes:
  workspace:
    external: true
    name: "${WORKSPACE_VOLUME}"
  results:
    external: true
    name: "${RESULTS_VOLUME}"
