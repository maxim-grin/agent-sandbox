# Nerv stack: Node/TypeScript worker (SSHd) + Redis + shared agent container.
#
# All Docker resources (networks, volumes) are created by run_agent.sh before
# compose is invoked — declared external here.
# run_agent.sh passes: RUN_ID, SANDBOX_NETWORK, LLM_NETWORK, WORKSPACE_VOLUME,
# RESULTS_VOLUME, TASK, RUNNER_SCRIPT, SSH_KEY_PATH, AGENT_SSH_PUBKEY,
# GROQ_API_KEY_FILE (path to secret file — not the key itself).

services:
  worker:
    build:
      context: worker
      dockerfile: Dockerfile
    image: ai-sandbox-nerv-worker
    container_name: "${RUN_ID}-nerv-worker-1"
    networks:
      - sandbox
      - llm
    volumes:
      - workspace:/workspace
      - results:/sandbox/results:ro
    environment:
      CI: "true"
      NODE_ENV: "test"
      REDIS_URL: "redis://redis:6379"
      NPM_CONFIG_UPDATE_NOTIFIER: "false"
      AGENT_SSH_PUBKEY: "${AGENT_SSH_PUBKEY}"
    mem_limit: 2g
    cpus: 2.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - SYS_CHROOT
    healthcheck:
      test: ["CMD", "node", "--version"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: "${RUN_ID}-nerv-redis"
    networks:
      - sandbox
    user: redis
    command:
      - redis-server
      - "--save"
      - ""
      - "--appendonly"
      - "no"
      - "--maxmemory"
      - "96mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--bind"
      - "0.0.0.0"
      - "--protected-mode"
      - "no"
      - "--loglevel"
      - "warning"
    mem_limit: 128m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  openhands:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.agent
    image: ai-sandbox-agent
    container_name: "${RUN_ID}-nerv-openhands"
    environment:
      - LLM_MODEL=${LLM_MODEL}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_USE_JSON_MODE=true
      - OPENHANDS_ALWAYS_APPROVE=true
      - TASK=${TASK}
      - SSH_HOST=worker
      - SSH_USER=sandboxuser
      - SSH_KEY=/run/secrets/ssh_key
      - REDIS_URL=redis://redis:6379
    secrets:
      - groq_api_key
    volumes:
      - results:/sandbox/results
      - ${RUNNER_SCRIPT}:/app/openhands_runner.py:ro
      - ${SSH_KEY_PATH}:/run/secrets/ssh_key:ro
    working_dir: /app
    networks:
      - sandbox
      - llm
    depends_on:
      worker:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 2g
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stdin_open: false
    tty: false
    command: python openhands_runner.py

networks:
  sandbox:
    external: true
    name: "${SANDBOX_NETWORK}"
  llm:
    external: true
    name: "${LLM_NETWORK}"

volumes:
  workspace:
    external: true
    name: "${WORKSPACE_VOLUME}"
  results:
    external: true
    name: "${RESULTS_VOLUME}"

secrets:
  groq_api_key:
    file: "${GROQ_API_KEY_FILE}"
