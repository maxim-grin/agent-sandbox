# Nerv stack: Node/TypeScript agent + Redis.
#
# All Docker resources (network, workspace volume, results volume) are created
# by run_agent.sh before this compose file is invoked, so they are declared
# external here. run_agent.sh passes RUN_ID, SANDBOX_NETWORK, LLM_NETWORK,
# WORKSPACE_VOLUME, RESULTS_VOLUME, TASK, and RUNNER_SCRIPT.
#
# The openhands image is built from Dockerfile.openhands (python + Node.js 20 +
# openhands-ai pre-installed). It runs agent commands locally in /workspace via
# the SDK's LocalRuntime — no worker container or Docker socket needed.

services:
  redis:
    image: redis:7-alpine
    container_name: "${RUN_ID}-nerv-redis"
    networks:
      - sandbox
    user: redis
    # No persistence; clean state guaranteed per run.
    command:
      - redis-server
      - "--save"
      - ""
      - "--appendonly"
      - "no"
      - "--maxmemory"
      - "96mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--bind"
      - "0.0.0.0"
      - "--protected-mode"
      - "no"
      - "--loglevel"
      - "warning"
    mem_limit: 128m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  openhands:
    build:
      context: .
      dockerfile: Dockerfile.openhands
    image: ai-sandbox-nerv-openhands
    container_name: "${RUN_ID}-nerv-openhands"
    environment:
      - LLM_MODEL=${LLM_MODEL}
      - LLM_API_KEY=${GROQ_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_USE_JSON_MODE=true
      - OPENHANDS_ALWAYS_APPROVE=true
      - TASK=${TASK}
      - REDIS_URL=redis://redis:6379
    volumes:
      - workspace:/workspace
      - results:/sandbox/results
      - ${RUNNER_SCRIPT}:/app/openhands_runner.py:ro
    working_dir: /app
    networks:
      - sandbox
      - llm
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 2g
    cpus: 1.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stdin_open: false
    tty: false
    command: python openhands_runner.py

networks:
  sandbox:
    external: true
    name: "${SANDBOX_NETWORK}"
  llm:
    external: true
    name: "${LLM_NETWORK}"

volumes:
  workspace:
    external: true
    name: "${WORKSPACE_VOLUME}"
  results:
    external: true
    name: "${RESULTS_VOLUME}"
