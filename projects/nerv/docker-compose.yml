# Nerv stack: Node/TypeScript worker (opencode serve) + Redis.
#
# All Docker resources (networks, volumes) are created by run_agent.sh before
# compose is invoked — declared external here.
# run_agent.sh passes: RUN_ID, SANDBOX_NETWORK, LLM_NETWORK, WORKSPACE_VOLUME,
# RESULTS_VOLUME, LLM_KEY_FILE, OPENAI_BASE_URL (= LLM_BASE_URL).

services:
  worker:
    build:
      context: worker
      dockerfile: Dockerfile
    image: ai-sandbox-nerv-worker
    container_name: "${RUN_ID}-nerv-worker-1"
    networks:
      - sandbox
      - llm
    volumes:
      - workspace:/workspace
    environment:
      CI: "true"
      NODE_ENV: "test"
      PORT: "3000"
      REDIS_URL: "redis://redis:6379"
      NPM_CONFIG_UPDATE_NOTIFIER: "false"
      OPENAI_BASE_URL: "${LLM_BASE_URL:-}"
      LLM_PROVIDER: "${LLM_PROVIDER:-}"
      LLM_MODEL_ID: "${LLM_MODEL_ID:-}"
      OLLAMA_HOST: "${OLLAMA_HOST:-http://host.docker.internal:11434}"
      OPENCODE_PORT: "${OPENCODE_PORT:-4096}"
      OPENCODE_HOST: "${OPENCODE_HOST:-127.0.0.1}"
      OPENCODE_EXPERIMENTAL_OUTPUT_TOKEN_MAX: "${OPENCODE_EXPERIMENTAL_OUTPUT_TOKEN_MAX:-16384}"
      OPENCODE_SERVER_PASSWORD: "${OPENCODE_SERVER_PASSWORD}"
    secrets:
      - llm_key
    mem_limit: 2g
    cpus: 2.0
    read_only: true
    tmpfs:
      - /tmp:size=100m,mode=1777
      - /home/ocuser:size=1g,uid=1001,gid=1001
      - /root/.local:size=50m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u opencode:$$OPENCODE_SERVER_PASSWORD http://$$OPENCODE_HOST:$$OPENCODE_PORT/global/health > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: "${RUN_ID}-nerv-redis"
    networks:
      - sandbox
    user: redis
    command:
      - redis-server
      - "--save"
      - ""
      - "--appendonly"
      - "no"
      - "--maxmemory"
      - "96mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--bind"
      - "0.0.0.0"
      - "--protected-mode"
      - "no"
      - "--loglevel"
      - "warning"
    mem_limit: 128m
    cpus: 0.5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

networks:
  sandbox:
    external: true
    name: "${SANDBOX_NETWORK}"
  llm:
    external: true
    name: "${LLM_NETWORK}"

volumes:
  workspace:
    external: true
    name: "${WORKSPACE_VOLUME}"

secrets:
  llm_key:
    file: "${LLM_KEY_FILE}"
